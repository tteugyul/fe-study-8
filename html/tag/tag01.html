<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <!-- 
        vs code -> ! 자동완성 -> lang="en"
        lang="ko" 설정
        Ctrl + ,  설정창  >  "emmet" 검색 > Emmet:Variables > Add Item > lang ko 설정
    -->

    <!-- 블록요소 vs 인라인요소 -->
    <!-- p 태그      span 태그 -->

    <p>첫번째 블록 요소</p>
    <p>두번째 블록 요소</p>
    <span>첫번째 인라인 요소</span>
    <span>두번째 인라인 요소</span>
    <p>세번째 블록 요소</p>
</body>
</html>
