<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <form>
        <label>고객명 : </label><input type="text">
        <br><br>
        <label>전화번호 : </label><input type="number">
        <br><br>
        <label>E-mail : </label><input type="email">
        <br><br>
        <label>피자선택 : </label>
        <select>
            <option selected disabled>피자를 선택하세요</option>
            <option>치즈</option>
            <option>페페로니</option>
            <option>콤비네이션</option>
        </select>
        <fieldset>
            <legend>피자 사이즈</legend>
            <input type="radio" name="size"><label>Small</label>
            <br>
            <br>
            <input type="radio" name="size"><label>Medium</label>
            <br>
            <br>
            <input type="radio" name="size"><label>Large</label>
        </fieldset>
        <fieldset>
            <legend>토핑 선택</legend>
            <input type="checkbox"><label>베이컨</label>
            <br>
            <br>
            <input type="checkbox"><label>치즈</label>
            <br>
            <br>
            <input type="checkbox"><label>양파</label>
            <br>
            <br>
            <input type="checkbox"><label>버섯</label>
        </fieldset>
        <br>
        <label>희망배송시간 : </label><input type="time">
        <br>
        <br>
        <label>배송시 요청사항 : </label><textarea></textarea>
        <br>
        <br>
        <button type="submit">주문하기</button>
    </form>
</body>
</html>
