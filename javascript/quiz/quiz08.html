<!DOCTYPE html>
<html lang="ko">

<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>

    <style>
        /* 필요시 작성 */
        .chicken {
            background-color: gray;
        }

        .pizza {
            color: red;
        }
    </style>
</head>

<body>
    <div class="container">
        <div id="main">
            <p id="p1">p1 텍스트</p>
            <p id="p2">p2 텍스트</p>
        </div>
    </div>
    <!-- <button onclick="changeMain()">main 배경색 gray로 변경</button> -->

    <button onclick="changeMain()">main 배경색 gray로 변경</button>

    <button onclick="changeP1()">p1 글자색 red로 변경</button>

    <button onclick="changeP2()">"p2 텍스트"를 "p2 글자" 로 변경</button>

    <br>

    <button onclick="mainWhite()">

        main 배경색 white로 변경

    </button>

    <button onclick="changeP1b()">

        p1 글자색 black

    </button>

    <script>

        /* 코드 작성 부분 */

        const ho = document.querySelectorAll(

            '.container'

        );

        function changeMain(



        ) {

            main.classList.toggle('chicken');

        }

        function changeP1(



        ) {

            p1.classList.toggle('pizza');

        }

        let count = 0;

        function changeP2(



        ) {

            // p2.textContent = 'p2 글자';

            let arr = [

                'p2 텍스트',
                'p2 하나',
                'p2 둘',
                'p2 셋',
                'p2 넷'

            ];

            p2.textContent = arr[

                count

            ];

            count++;

            if (

                count == 5

            ) {

                count = 0;

            }

        }

        function mainWhite(



        ) {

            main.backgroundColor = 'white';

        }

        function changeP1b(



        ) {

            p1.style.color = 'black';

        }

    </script>
</body>

</html>
