<!DOCTYPE html>
<html lang="ko">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>

<body>

    <!-- <form> -->

    <input type="text" id="input_text">

    <!-- </form> -->

    <script>

        const input_text = document.getElementById(

            'input_text'


        );

        input_text.addEventListener(

            "keydown",
            (

                eventInfo

            ) => {

                // 키보드 이벤트 관련 정보 -> 매개변수로 전달

                console.log(

                    "keydown 실행됨"

                );

                console.log(

                    eventInfo

                );

                // deprecated 상태  앞으로 새로운 패치나... 조만간 사라질수 있으니 주의
                // 사용 자제

                if (

                    eventInfo.keyCode == 13

                ) {

                    console.log(

                        'keyCode 13 엔터키 눌림'

                    );

                }

                // key 사용 권장

                if (

                    eventInfo.key == 'Enter'

                ) {

                    console.log(

                        'key- == Enter 엔터키 눌림'

                    );

                }

                if (

                    eventInfo.key == 'q'

                ) {

                    location.href = "https://coupang.com";

                }

            }

        )

        input_text.addEventListener(

            'keyup',
            (

                event

            ) => {

                console.log(

                    'keyup 이벤트 발생'

                );

            }

        )

        input_text.addEventListener(

            'focus',
            (



            ) => {

                console.log(

                    'focus 이벤트 발생'

                );

            }

        )

        input_text.addEventListener(

            'blur',
            (



            ) => {

                console.log(

                    'blur 이벤트 발생'

                );

            }

        )

    </script>

</body>

</html>
