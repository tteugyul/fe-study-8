<!DOCTYPE html>
<html lang="ko">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        /* font-size:10px; */
        #box {
            width: 100px;
            height: 100px;
            background-color: cadetblue;
        }
    </style>
</head>

<body>
    <h1 id="target">이벤트 등록</h1>
    <button onclick="event1()">이벤트 버튼1</button>
    <button id="btn_evt2">이벤트 버튼2</button>
    <button id="btn_evt3">이벤트 버튼3</button>
    <div id="box">박스 div 버튼 대신에 이벤트</div>
    <script>
        function event1() {
            console.log("event1() 호출됨");
            document.getElementById("target").textContent = "이벤트 등록1";
            document.getElementById("target").style.color = "red";
        }
        function event2() {
            console.log("event2() 호출됨");
            document.getElementById("target").textContent = "이벤트 등록2";
            document.getElementById("target").style.fontSize = "42px";
        }
        document.getElementById("btn_evt2").onclick = event2;
        function event3() {
            console.log("event3() 호출됨");
            document.getElementById("target").textContent = "이벤트 등록3";
        }
        const btn_evt3 = document.getElementById('btn_evt3');
        btn_evt3.addEventListener('click', event3);
        //이벤트 등록       무슨이벤트, 어떤걸실행할지 함수
        // document.getElementById('box')
        document.querySelector('#box').addEventListener('click', () => {
            console.log("#box 클릭 이벤트 발생");
            document.querySelector('#box').style.backgroundColor = "orange";
        })
        document.querySelector('#box').addEventListener('dblclick', () => {
            console.log("#box 더블클릭 이벤트 발생");
            //페이지 경로 이동
            //a href=
            //<form action=""
            location.href = "https://netflix.com"//이동할 url 경로
        })
    </script>
</body>

</html>
