<!DOCTYPE html>
<html lang="ko">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        .box {
            width: 400px;
            height: 400px;
            background-color: antiquewhite;
        }

        h2 {
            color: red;
        }

        p {
            font-weight: bold;
        }

        @media screen and (max-width:768px) {
            .box {
                background-color: aquamarine;
                width: 330px;
            }

            h2 {
                color: blue;
            }

            p {
                font-weight: normal;
            }
        }

        @media screen and (max-width:480px) {
            .box {
                background-color: darkkhaki;
            }

            p {
                font-size: 10px;
            }
        }
    </style>
</head>

<body>
    <div class="box">
        <h2>h2 tag</h2>
        <p>p tag</p>
        <p>Lorem ipsum dolor sit amet consectetur adipisicing elit. Recusandae dolore doloremque unde saepe consequatur
            laudantium, possimus minus fuga velit omnis, voluptas cumque ipsa eveniet, alias atque voluptates aspernatur
            voluptatem impedit?</p>
    </div>
</body>

</html>
