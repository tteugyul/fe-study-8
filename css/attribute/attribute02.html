<!DOCTYPE html>
<html lang="ko">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        .font-attr1 {
            font-family: 'Times New Roman', Times, serif;
            font-size: 30px;
            font-variant: small-caps;
            color: darkblue;
            letter-spacing : 10px; /* 자간 */
            line-height : 50px; /* 행간 */
        }

        .font-attr2 {
            /* 700 bold */
            font-weight: 700;
            font-style: italic;
            /* 
                italic : 이탤릭체 
                oblique : 기울임 
            */
        }

        .font-box {
            /* 정렬 */
            text-align: center;
        }

        .inbox1{
            /* em 상대크기 부모요소의 크기 대비 */
            font-size : 2em;
        }

        .inbox2 {
            /* rem 상대크기 */
            /* HTML 크기 대비 */
            font-size : 2em;
        }
    </style>
</head>

<body>
    <p>기본 텍스트 Font attr1</p>
    <p class="font-attr1">Font attr1</p>
    <p class="font-attr2">Font attr2 글씨 속성</p>

    <i>
        Font attr
    </i>

    <div class="font-box">
        <p>
            font box 글자 1111
        </p>
        <p>
            font box 글자 2222
        </p>
        <p>
            font box 글자 3333
        </p>
    </div>

    <div class="font-box2">
        <p class="gugi-regular">font box 글자 1111</p>
        <p class="inbox1">font box 글자 2222</p>
        <p class="inbox2">font box 글자 3333</p>
    </div>

    <p>
        오늘의 특가 <del> 5,000원 </del> <ins> 3,000원 </ins>
    </p>
    
    <p>
        오늘의 특가 
        <span style = "text-decoration : line-through;"> 5,000원 </span> 
        <span style = "text-decoration : underline;"> 3,000원 </span>
    </p>
</body>

</html>
