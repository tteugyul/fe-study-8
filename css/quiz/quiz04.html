<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        * {
            margin: 0;  /* 외부 여백 0 */
            padding: 0; /* 내부 여백 0 */
            box-sizing: border-box;
            /* 박스모델에 사이즈 지정시, border 까지 사이즈 로 인식 */
        }
        .h3{
            background-color:lightgray;
        }
        .box{
            width:600px;
            height:300px;
            border:5px solid black;
            margin:50px;
            position:static;
        }
        .A{
            background-color:red;
            width:100px;
            height:100px;
            position:relative;
        }
        .B{
            background-color:green;
            width:100px;
            height:100px;
            position:absolute;
            z-index:5;
            left:100px;
            top:150px;
        }
        .C{
            background-color:yellow;
            width:100px;
            height:100px;
            position:relative;
        }
    </style>
</head>
<body>
    <div class="h3">
        <h3>배경색이 lightgray</h3>
        <h3>h3글자</h3>
    </div>
    <div class="box">
        <div class="A">A</div>
        <div class="B">B</div>
        <div class="C">C</div>
    </div>
</body>
</html>
