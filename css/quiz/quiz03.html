<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        * {
            margin: 0;  /* 외부 여백 0 */
            padding: 0; /* 내부 여백 0 */
            box-sizing: border-box;
            /* 박스모델에 사이즈 지정시, border 까지 사이즈 로 인식 */
        }
        .box{
            width:200px;
            height:100px;
            border:2px solid green;
            margin:55px;
            margin-top:5px;
            padding:0px;
            display:inline-block;
        }
        .title{
            font-size:30px;
            font-weight:bold;
            width:200px;
            height:100px;
        }
        .lorem{
            font-size:30px;
            font-weight:bold;
        }
    </style>
</head>
<body>
    <br>
    <div class="title"><span>박스 정렬</span></div>
    <div class="box"></div>
    <div class="box"></div>
    <div class="box"></div>
    <div class="box"></div>
    <div class="box"></div>
    <div class="box"></div>
    <div class="lorem"><span>Lorem ipsum dolor sit amet consectetur adipisicing elit. Ea consequuntur soluta animi cumque voluptatum, vel laudantium corporis tempora at dolores? Unde, repellat! Nobis eius, doloribus non consequatur fugiat itaque doloremque.</span></div>
</body>
</html>
