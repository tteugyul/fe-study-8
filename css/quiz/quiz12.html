<!DOCTYPE html>
<html lang="ko">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        span {
            color: white;
        }

        .container {
            width: 700px;
            margin: 0 auto;
            margin-top: 50px;
            border: 2px solid black;
        }

        .center {
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .nav {
            display: flex;
            justify-content: space-between;
        }

        .nav-left {
            background-color: red;
            height: 100px;
            width: 30%;
        }

        .nav-right {
            background-color: red;
            height: 100px;
            width: 20%;
        }

        .main {
            display: flex;
            justify-content: space-between;
        }

        .main-left {
            background-color: orange;
            height: 300px;
            width: 70%;
            display: flex;
            flex-wrap: wrap;
            justify-content: space-evenly;
            align-content: space-evenly;
        }

        .main-left-content {
            width: 100px;
            height: 50px;
            background-color: black;
            transition-property: all;
            transition-duration: 1s;
            margin: 30px;
        }

        .main-left-content:hover {
            transform: scale(1.5);
        }

        .main-right {
            background-color: green;
            height: 300px;
            width: 30%;
        }

        .footer {
            width: 100%;
            height: 100px;
            background-color: blue;
        }
    </style>
</head>

<body>
    <div class="container">
        <div class="nav">
            <div class="nav-left center">
                <span>메인메뉴</span>
            </div>
            <div class="nav-right center">
                <span>마이페이지</span>
            </div>
        </div>
        <div class="main">
            <div class="main-left">
                <div class="main-left-content"></div>
                <div class="main-left-content"></div>
                <div class="main-left-content"></div>
                <div class="main-left-content"></div>
                <div class="main-left-content"></div>
                <div class="main-left-content"></div>
            </div>
            <div class="main-right center">
                <span>aside</span>
            </div>
        </div>
        <div class="footer center">
            <span>footer</span>
        </div>
    </div>
</body>

</html>
