<!DOCTYPE html>
<html lang="ko">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=, initial-scale=1.0">
    <title>Document</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        .container {
            width: 800px;
            border: 1px solid black;
        }

        .head {
            display: flex;
            justify-content: center;
            flex-wrap: wrap;
        }

        .head-1 {
            background-color: yellow;
            width: 50%;
            height: 100px;
            border: 1px solid black;
        }

        .head-2 {
            background-color: gray;
            width: 50%;
            height: 100px;
            border: 1px solid black;
        }

        .nav {
            background-color: purple;
            width: 100%;
            height: 100px;
            border: 1px solid black;
        }

        .main {
            display: flex;
            flex-wrap: wrap;
        }

        .main-1 {
            width: 40%;
            height: 200px;
            background-color: cadetblue;
            border: 1px solid black;
        }

        .main-2 {
            width: 60%;
            height: 200px;
            display: flex;
            flex-wrap: wrap;
        }

        .main-2-1 {
            width: 100%;
            height: 100px;
            background-color: yellow;
            border: 1px solid black;
        }

        .main-2-2 {
            width: 100%;
            height: 100px;
            background-color: bisque;
            border: 1px solid black;
        }

        .foot {
            display: flex;
            flex-wrap: wrap;
        }

        .foot-1 {
            width: 25%;
            height: 100px;
            background-color: yellow;
            border: 1px solid black;
        }

        .foot-2 {
            width: 25%;
            height: 100px;
            background-color: orange;
            border: 1px solid black;
        }

        .foot-3 {
            width: 25%;
            height: 100px;
            background-color: yellow;
            border: 1px solid black;
        }

        .foot-4 {
            width: 25%;
            height: 100px;
            background-color: olivedrab;
            border: 1px solid black;
        }

        @media screen and (max-width:800px) {
            .container {
                margin: 0 auto;
            }
        }

        @media screen and (max-width:700px) {
            .container {
                width: 100%;
            }
        }

        @media screen and (max-width:650px) {

            .foot-1,
            .foot-2,
            .foot-3,
            .foot-4 {
                flex: 1 1 50%;
            }
        }

        @media screen and (max-width:500px) {

            .head-1,
            .head-2 {
                flex: 1 1 100%;
            }

            .main-1 {
                flex: 1 1 100%;
                height: 100px;
            }

            .main-2 {
                width: 100%;
                height: auto;
            }

            .main-2-1,
            .main-2-2 {
                flex: 1 1 50%;
            }
        }

        @media screen and (max-width:350px) {

            .main-2-1,
            .main-2-2,
            .foot-1,
            .foot-2,
            .foot-3,
            .foot-4 {
                flex: 1 1 100%;
            }
        }
    </style>
</head>

<body>
    <div class="container">
        <div class="head">
            <div class="head-1"></div>
            <div class="head-2"></div>
        </div>
        <div class="nav"></div>
        <div class="main">
            <div class="main-1"></div>
            <div class="main-2">
                <div class="main-2-1"></div>
                <div class="main-2-2"></div>
            </div>
        </div>
        <div class="foot">
            <div class="foot-1"></div>
            <div class="foot-2"></div>
            <div class="foot-3"></div>
            <div class="foot-4"></div>
        </div>
    </div>
</body>

</html>
